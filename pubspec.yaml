name: carbon_intensity_dashboard
description: A Flutter dashboard for viewing GB national carbon intensity data.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.10.0 <4.0.0"
  flutter: ">=3.29.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_bloc: ^9.1.1
  bloc: ^9.2.0
  equatable: ^2.0.5

  # Networking
  http: ^1.2.2

  # Charting
  fl_chart: ^1.2.0

  # Utilities
  intl: ^0.20.2
  prefer_shorthands: ^0.4.7
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  bloc_test: ^10.0.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true